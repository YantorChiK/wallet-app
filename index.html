<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Wallet</title>
    <!-- Подключаем стили Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем библиотеку Solana Web3.js -->
    <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
    <!-- Подключаем Telegram WebApp SDK для связи с твоим ботом -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #06010F;
            color: #A78BFA;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        /* Фирменный градиент Глубокого поля для карты баланса */
        .deep-field-gradient {
            background: linear-gradient(135deg, #06010F 0%, #3B1578 50%, #6C2BD9 100%);
            border: 2px solid #6C2BD9;
        }
        .vibrant-purple-btn {
            background-color: #6C2BD9;
            color: #ffffff;
        }
        .deep-border {
            border-color: #6C2BD9;
        }
    </style>
</head>
<body class="select-none overflow-hidden h-screen flex flex-col justify-between p-4">

    <!-- ЭКРАН АВТОРИЗАЦИИ / ИМПОРТА КЛЮЧА -->
    <div id="auth-screen" class="flex flex-col justify-center items-center h-full w-full space-y-6 text-center">
        <div class="space-y-2">
            <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-[#A78BFA] to-[#6C2BD9]">SHADOW WALLET</h1>
            <p class="text-sm text-[#A78BFA]/70">Некастодиальный Solana-сейф в Telegram</p>
        </div>

        <div class="border border-[#6C2BD9] bg-[#06010F] p-6 rounded-2xl w-full shadow-2xl flex flex-col items-center justify-center space-y-4">
            <div class="text-4xl">🛡️</div>
            <p class="font-bold text-lg text-white">Ваши ключи — ваши деньги</p>
            <p class="text-xs leading-relaxed text-[#A78BFA]/80">Ключи зашифрованы локально внутри Telegram. Мы не имеем доступа к вашим средствам.</p>
        </div>

        <div class="w-full space-y-3">
            <button onclick="generateNewWallet()" class="w-full py-4 rounded-xl font-bold bg-[#6C2BD9] text-white transition-transform active:scale-95 shadow-lg">
                Создать новый кошелек
            </button>
            <button onclick="showImportFields()" class="w-full py-4 rounded-xl font-bold bg-[#06010F] border-2 border-[#6C2BD9] text-[#A78BFA] transition-transform active:scale-95">
                Импортировать по Private Key
            </button>
        </div>

        <!-- Поля для импорта приватного ключа без упоминания Base58 -->
        <div id="import-area" class="hidden w-full space-y-3 pt-2">
            <input id="private-key-input" type="text" placeholder="Введите ваш приватный ключ" class="w-full p-4 rounded-xl bg-[#06010F] border border-[#A78BFA] text-sm text-white focus:outline-none focus:border-[#6C2BD9] placeholder-[#A78BFA]/40">
            <button onclick="importWalletSubmit()" class="w-full py-3 rounded-xl font-bold bg-[#6C2BD9] text-white text-sm active:scale-95">
                Подтвердить импорт
            </button>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН (БАЛАНСЫ И АКТИВЫ) -->
    <div id="main-screen" class="hidden flex flex-col justify-between h-full w-full">
        <!-- Шапка -->
        <div class="flex justify-between items-center pb-4 border-b border-[#6C2BD9]/30">
            <div class="flex items-center">
                <span class="w-2.5 h-2.5 rounded-full bg-[#A78BFA] mr-2"></span>
                <span class="text-xs font-semibold uppercase tracking-widest text-[#A78BFA]">Solana Mainnet</span>
            </div>
            <button onclick="logoutWallet()" class="text-xs bg-[#6C2BD9]/20 border border-[#6C2BD9] text-[#A78BFA] px-3 py-1.5 rounded-lg active:scale-95">
                Выйти
            </button>
        </div>

        <!-- Карточка Баланса (Палитра Глубокого поля) -->
        <div class="my-6 deep-field-gradient p-6 rounded-3xl shadow-2xl relative overflow-hidden flex flex-col justify-between h-44">
            <div class="flex justify-between items-start">
                <span class="text-xs font-bold tracking-widest uppercase opacity-70 text-[#A78BFA]">Текущий баланс</span>
                <span class="text-xs font-mono font-bold bg-[#06010F]/40 border border-[#6C2BD9] text-white px-2 py-1 rounded cursor-pointer" onclick="copyAddress()" id="wallet-address-short">ADDR</span>
            </div>
            <div class="flex flex-col space-y-1">
                <h2 class="text-4xl font-black font-mono tracking-tight text-white" id="balance-sol">0.0000 SOL</h2>
                <span class="text-sm font-bold opacity-80 text-[#A78BFA]" id="balance-usd">$0.00 USD</span>
            </div>
        </div>

        <!-- Кнопки действий -->
        <div class="grid grid-cols-3 gap-4 mb-4">
            <button onclick="copyAddress()" class="py-4 rounded-2xl bg-[#06010F] border border-[#6C2BD9] flex flex-col items-center justify-center space-y-2 active:scale-95 transition-transform">
                <span class="text-xl">📥</span>
                <span class="text-xs font-bold">Получить</span>
            </button>
            <button onclick="alert('Функция отправки временно отключена')" class="py-4 rounded-2xl bg-[#06010F] border border-[#6C2BD9] flex flex-col items-center justify-center space-y-2 active:scale-95 transition-transform">
                <span class="text-xl">📤</span>
                <span class="text-xs font-bold">Отправить</span>
            </button>
            <button onclick="alert('Обмены Jupiter настраиваются...')" class="py-4 rounded-2xl bg-[#06010F] border border-[#6C2BD9] flex flex-col items-center justify-center space-y-2 active:scale-95 transition-transform">
                <span class="text-xl">🔄</span>
                <span class="text-xs font-bold">Своп</span>
            </button>
        </div>

        <!-- Кнопка Интеграции с твоим ботом-терминалом -->
        <div class="mb-6" id="integration-area">
            <button onclick="exportToTerminal()" class="w-full py-3.5 rounded-xl font-bold bg-[#6C2BD9] text-white active:scale-95 transition-transform shadow-lg text-xs uppercase tracking-wider">
                Импортировать в терминал бота 🔑
            </button>
        </div>

        <!-- Мои активы -->
        <div class="flex-grow overflow-y-auto space-y-3 pr-1">
            <h3 class="text-xs font-bold tracking-widest uppercase text-[#A78BFA]/50 mb-2">Мои активы</h3>
            
            <!-- Строка SOL -->
            <div class="flex justify-between items-center p-4 bg-[#06010F] border border-[#6C2BD9]/30 rounded-2xl">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-[#6C2BD9] to-[#A78BFA] flex items-center justify-center text-lg">☀️</div>
                    <div>
                        <p class="font-bold text-white text-sm">Solana</p>
                        <p class="text-xs text-[#A78BFA]/60 font-mono">SOL</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-bold text-white text-sm" id="list-sol-bal">0.0000</p>
                    <p class="text-xs text-[#A78BFA]/60" id="list-usd-bal">$0.00</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE58_ALPHABET = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";

        // Инициализация Telegram WebApp
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) {
            tg.expand(); // Раскрываем WebApp на весь экран телефона
            tg.ready();
        }

        // Base58 кодер/декодер для импорта
        function b58Encode(buffer) {
            let n = BigInt(0);
            for (const byte of buffer) { n = (n << 8n) + BigInt(byte); }
            let res = [];
            while (n > 0n) {
                const r = n % 58n;
                n = n / 58n;
                res.push(BASE58_ALPHABET[Number(r)]);
            }
            for (const byte of buffer) {
                if (byte === 0) res.push('1');
                else break;
            }
            return res.reverse().join('');
        }

        function bs58_decode(str) {
            let bytes = [0];
            for (let i = 0; i < str.length; i++) {
                const char = str[i];
                let value = BASE58_ALPHABET.indexOf(char);
                if (value === -1) return null;
                for (let j = 0; j < bytes.length; j++) {
                    value += bytes[j] * 58;
                    bytes[j] = value & 0xff;
                    value = value >> 8;
                }
                while (value > 0) {
                    bytes.push(value & 0xff);
                    value = value >> 8;
                }
            }
            for (let i = 0; i < str.length && str[i] === "1"; i++) {
                bytes.push(0);
            }
            return new Uint8Array(bytes.reverse());
        }

        function showImportFields() {
            document.getElementById('import-area').classList.toggle('hidden');
        }

        function generateNewWallet() {
            try {
                const keypair = solanaWeb3.Keypair.generate();
                saveWalletAndLogin(keypair);
            } catch (e) {
                alert("Ошибка генерации: " + e);
            }
        }

        function importWalletSubmit() {
            const input = document.getElementById('private-key-input').value.trim();
            if (!input) {
                alert("Пожалуйста, введите приватный ключ.");
                return;
            }
            const decoded = bs58_decode(input);
            if (!decoded || decoded.length !== 64) {
                alert("Невалидный приватный ключ Solana.");
                return;
            }
            try {
                const keypair = solanaWeb3.Keypair.fromSecretKey(decoded);
                saveWalletAndLogin(keypair);
            } catch (e) {
                alert("Ошибка импорта: " + e);
            }
        }

        function saveWalletAndLogin(keypair) {
            const secretKeyArr = Array.from(keypair.secretKey);
            localStorage.setItem('shadow_wallet_key', JSON.stringify(secretKeyArr));
            checkSessionAndLogin();
        }

        function logoutWallet() {
            if (confirm("Вы уверены, что хотите выйти? Обязательно сохраните ваш приватный ключ, иначе вы потеряете доступ к средствам!")) {
                localStorage.removeItem('shadow_wallet_key');
                document.getElementById('main-screen').classList.add('hidden');
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('private-key-input').value = '';
                document.getElementById('import-area').classList.add('hidden');
            }
        }

        // Обновление баланса через Ankr RPC
        async function updateBalance(publicKeyStr) {
            try {
                const connection = new solanaWeb3.Connection("https://rpc.ankr.com/solana", "confirmed");
                const pubKey = new solanaWeb3.PublicKey(publicKeyStr);
                const balance = await connection.getBalance(pubKey);
                const sol = balance / 1000000000;
                
                document.getElementById('balance-sol').innerText = sol.toFixed(4) + ' SOL';
                document.getElementById('list-sol-bal').innerText = sol.toFixed(4);
                
                const usd = sol * 140; 
                document.getElementById('balance-usd').innerText = '$' + usd.toFixed(2) + ' USD';
                document.getElementById('list-usd-bal').innerText = '$' + usd.toFixed(2);
            } catch (e) {
                console.error("Ошибка баланса: ", e);
            }
        }

        function copyAddress() {
            const keyStr = localStorage.getItem('shadow_wallet_key');
            if (keyStr) {
                const secretKey = new Uint8Array(JSON.parse(keyStr));
                const keypair = solanaWeb3.Keypair.fromSecretKey(secretKey);
                const address = keypair.publicKey.toString();
                
                navigator.clipboard.writeText(address).then(() => {
                    alert("Адрес кошелька скопирован:\n" + address);
                }).catch(() => {
                    alert("Адрес кошелька: " + address);
                });
            }
        }

        // Функция отправки ключа обратно в торговый Telegram-бот
        function exportToTerminal() {
            const keyStr = localStorage.getItem('shadow_wallet_key');
            if (keyStr && tg) {
                const secretKey = new Uint8Array(JSON.parse(keyStr));
                const b58Key = b58Encode(secretKey);
                
                // Передаем приватный ключ обратно боту
                tg.sendData(b58Key);
                tg.close();
            } else {
                alert("Запустите WebApp внутри вашего торгового бота Telegram.");
            }
        }

        function checkSessionAndLogin() {
            const keyStr = localStorage.getItem('shadow_wallet_key');
            if (keyStr) {
                try {
                    const secretKey = new Uint8Array(JSON.parse(keyStr));
                    const keypair = solanaWeb3.Keypair.fromSecretKey(secretKey);
                    const publicKeyStr = keypair.publicKey.toString();
                    
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('main-screen').classList.remove('hidden');
                    
                    const shortAddr = publicKeyStr.slice(0, 4) + '...' + publicKeyStr.slice(-4);
                    document.getElementById('wallet-address-short').innerText = shortAddr;
                    
                    updateBalance(publicKeyStr);
                } catch (e) {
                    console.error("Ошибка сессии: ", e);
                }
            }
        }

        window.onload = checkSessionAndLogin;
    </script>
</body>
                                     </html>
